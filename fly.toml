# fly.toml file generated for royal-darbar
app = "royal-darbar"
primary_region = "del"

[build]
  builder = "paackages"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]
